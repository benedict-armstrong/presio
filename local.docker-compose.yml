# Fully local / offline Presio — a single container, no Supabase, no .env.
#
# Addresses https://github.com/benedict-armstrong/presio/issues/2: the root
# docker-compose.yml is the full self-hosted stack (Supabase + Traefik +
# MinIO + analytics/uptime), which is deployment-only baggage if all you want
# is to present PDFs on your own machine or LAN. In PRESIO_MODE=local the
# server swaps Supabase for a bundled SQLite database and filesystem storage
# (see server/local/), so there's nothing else to run.
#
# Login/sync-by-account is unavailable in this mode (there's no auth provider
# to back it) — everything runs anonymous, which is enough for local
# presenting, handoff links, and LAN sync between the controller and viewers.
#
# Nothing to clone — this file is all you need, and it pulls a prebuilt image:
#
#   curl -fsSLO https://raw.githubusercontent.com/benedict-armstrong/presio/main/local.docker-compose.yml
#   docker compose -f local.docker-compose.yml up
#   open http://localhost:3001
#
# Working in a checkout instead? `docker compose -f local.docker-compose.yml
# build` builds from source rather than using the published image.
#
# For presenting to viewers on other devices on the same network, open
# http://<this-machine's-LAN-IP>:3001 on those devices instead of localhost —
# PDF links are relative, so they resolve correctly either way.

name: presio-local

services:
  presio:
    # Published by .github/workflows/publish-local-image.yml (linux/amd64 +
    # linux/arm64). Compose pulls this when it isn't already present locally and
    # falls back to `build:` below, so this file works with or without a
    # checkout. Pin a tag instead of :latest if you'd rather upgrade explicitly.
    image: ghcr.io/benedict-armstrong/presio-local:latest
    # Explicit so `up` pulls rather than silently building from source — with
    # both image: and build: set, Compose's default is version-dependent, and a
    # copy of this file downloaded on its own has no build context to fall back
    # on. `docker compose build` still builds regardless.
    pull_policy: missing
    build:
      context: .
      dockerfile: deploy/Dockerfile
      # Built without Supabase config so the client's login UI talks to
      # nothing real; PRESIO_MODE=local makes the server side fully anonymous
      # to match (see client/src/lib/supabaseClient.ts's placeholder fallback).
      args:
        VITE_SUPABASE_URL: ""
        VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ""
        VITE_SENTRY_DSN: ""
    container_name: presio-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      PRESIO_MODE: local
      LOCAL_DATA_DIR: /data
      # No reverse proxy in front of this container.
      TRUST_PROXY: "false"
    volumes:
      - presio-local-data:/data

volumes:
  presio-local-data:
